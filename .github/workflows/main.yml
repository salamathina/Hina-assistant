name: Build Hina APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install Dependencies
        run: |
          pip install flet
          pip install pyttsx3
          sudo apt-get update
          sudo apt-get install -y espeak
      
      - name: Build APK
        run: flet build apk --org com.hina.app --product "Hina Assistant"
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Hina-APK
          path: build/apk/debug/*.apk
